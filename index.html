<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Macify</title>
</head>
<body>
    <main>
        <section class="image">
            <div class="image-frame">
                <img id="uploaded-file" height="1000">
            </div>
        </section>

        <section class="nav">
            <ul>
                <li>
                    <input type="file" id="file-input" accept="image/*" onclick="onFileSelected(event)">
                </li>
                <li><input type="text" id="width" placeholder="1080"></li>
                <li><input type="text" id="height" placeholder="1350"></li>
                <li>
                    <button id="btn-download">Download</button>
                </li>
            </ul>
        </section>
    </main>

    <script src="./js/jquery-4.0.0.min.js" type="text/javascript" defer></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js" defer></script>
    <script src="./js/script.js" type="text/javascript" defer></script>
</body>
</html>
